name: Publish docs

# Per AGENTS.md "CI: publish docs on merge" (plan.md todo #16): on merge to
# the default branch, regenerate build/mappings/*.{sssom.tsv,ttl} and the
# docs/mappings/*.md pages derived from them, build the Zensical site, and
# publish it to GitHub Pages.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Minimum permissions for the official Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  # NOTE: single hand-authored mapping set for now (see AGENTS.md); a future
  # multi-mapping-set increment should loop over mappings/*.csv instead of
  # hardcoding this one pair.
  MAPPING_CSV: mappings/omop-onz-g.csv
  MAPPING_METADATA: mappings/omop-onz-g.metadata.json
  MAPPING_SET_ID: "https://raw.githubusercontent.com/plugin-healthcare/sssom-rosetta/main/build/mappings/omop-onz-g.sssom.tsv"
  MAPPING_LICENSE: "https://creativecommons.org/publicdomain/zero/1.0/"
  CURIE_MAP: '{"omop": "https://w3id.org/omop/ontology/", "onz-g": "http://purl.org/ozo/onz-g#", "skos": "http://www.w3.org/2004/02/skos/core#", "semapv": "https://w3id.org/semapv/vocab/", "orcid": "https://orcid.org/"}'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.13"

      - name: Sync dependencies (incl. docs group)
        run: uv sync --locked --group docs

      - name: Build mapping set (SSSOM/TSV + TTL)
        run: |
          uv run rosetta mapping build "$MAPPING_CSV" "$MAPPING_METADATA" \
            --mapping-set-id "$MAPPING_SET_ID" \
            --license "$MAPPING_LICENSE" \
            --curie-map "$CURIE_MAP" \
            --output-dir build/mappings

      - name: Regenerate docs/mappings/*.md from the built TSV(s)
        run: uv run rosetta docs generate-mapping-pages

      - name: Build the Zensical site
        run: uv run zensical build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
